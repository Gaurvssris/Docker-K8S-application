# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml


trigger:
  branches:
    include:
      - main

pool:
  name: 'Devopsadvanceagent'

variables:
  acrName: 'acrprod9838'
  acrLoginServer: 'acrprod9838.azurecr.io'
  imageName: 'july-calendar'
  imageTag: '$(Build.BuildId)'

steps:
- checkout: self
  displayName: 'Checkout Source Code'

- task: PowerShell@2
  displayName: 'Find Dockerfile Location'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Listing all files in source directory:"
      Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Force | Select-Object FullName

      Write-Host "Searching for Dockerfile specifically:"
      Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter "Dockerfile*" -Force | Select-Object FullName