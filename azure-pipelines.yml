# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml


trigger:
- main

pool:
  name: Devopsadvanceagent

variables:
  acrName: acrprod9838
  imageName: july-calendar
  imageTag: $(Build.BuildId)

steps:

# Checkout Source Code
- checkout: self
  displayName: Checkout Source Code

# Display Versions
- powershell: |
    Write-Host "===== Docker Version ====="
    docker --version

    Write-Host "===== Azure CLI Version ====="
    az --version
  displayName: Check Docker & Azure CLI

# Login Azure, Build Image & Push to ACR
- task: AzureCLI@2
  displayName: Build and Push Docker Image to ACR
  inputs:
    azureSubscription: 'Devopsadvancesc'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |

      Write-Host "===== Login to ACR ====="
      az acr login --name $(acrName)

      Write-Host "===== Docker Build ====="
      docker build -t $(acrName).azurecr.io/$(imageName):$(imageTag) .

      Write-Host "===== Docker Tag Latest ====="
      docker tag $(acrName).azurecr.io/$(imageName):$(imageTag) $(acrName).azurecr.io/$(imageName):latest

      Write-Host "===== Push BuildId Tag ====="
      docker push $(acrName).azurecr.io/$(imageName):$(imageTag)

      Write-Host "===== Push Latest Tag ====="
      docker push $(acrName).azurecr.io/$(imageName):latest

      Write-Host "===== Images in Local Docker ====="
      docker images

# Verify Image in ACR
- task: AzureCLI@2
  displayName: Verify ACR Repository
  inputs:
    azureSubscription: 'Devopsadvancesc'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |

      az acr repository list `
      --name $(acrName) `
      --output table

      az acr repository show-tags `
      --name $(acrName) `
      --repository $(imageName) `
      --output table