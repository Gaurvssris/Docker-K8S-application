# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml


trigger:
  branches:
    include:
      - main

pool:
  name: 'Devopsadvanceagent'

variables:
  acrName: 'acrprod9838'
  acrLoginServer: 'acrprod9838.azurecr.io'
  imageName: 'july-calendar'
  imageTag: '$(Build.BuildId)'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  buildContext: '$(Build.SourcesDirectory)'

steps:
- checkout: self
  displayName: 'Checkout Source Code'

- task: PowerShell@2
  displayName: 'Check Docker & Azure CLI'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Docker Version:"
      docker --version
      Write-Host "Azure CLI Version:"
      az --version

- task: AzureCLI@2
  displayName: 'Build and Push Docker Image'
  inputs:
    azureSubscription: 'Devopsadvancesc'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |
      Write-Host "Login to ACR"
      az acr login --name $(acrName)

      Write-Host "Checking Dockerfile"
      if (-Not (Test-Path "$(dockerfilePath)")) {
        Write-Error "Dockerfile not found at $(dockerfilePath)"
        exit 1
      }
      Get-ChildItem "$(buildContext)"

      Write-Host "Building Image"
      docker build -f "$(dockerfilePath)" -t "$(acrLoginServer)/$(imageName):$(imageTag)" "$(buildContext)"

      Write-Host "Tagging as latest"
      docker tag "$(acrLoginServer)/$(imageName):$(imageTag)" "$(acrLoginServer)/$(imageName):latest"

      Write-Host "Pushing build id tag"
      docker push "$(acrLoginServer)/$(imageName):$(imageTag)"

      Write-Host "Pushing latest tag"
      docker push "$(acrLoginServer)/$(imageName):latest"

      Write-Host "Done"