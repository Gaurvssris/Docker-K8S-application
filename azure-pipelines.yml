# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml


trigger:
- main

pool:
  name: Devopsadvanceagent

variables:
  acrName: acrprod9838
  imageRepository: july-calendar
  imageTag: $(Build.BuildId)

steps:

# Checkout Source Code
- checkout: self
  displayName: 'Checkout Source Code'

# Check Docker & Azure CLI
- powershell: |
    Write-Host "===== Docker Version ====="
    docker --version

    Write-Host "===== Azure CLI Version ====="
    az --version
  displayName: 'Check Docker & Azure CLI'

# Build & Push Docker Image to Azure Container Registry
- task: AzureCLI@2
  displayName: 'Build and Push Docker Image'
  inputs:
    azureSubscription: 'Devopsadvancesc'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    inlineScript: |

      Write-Host "========== LOGIN TO ACR =========="
      az acr login --name $(acrName)

      Write-Host "========== BUILD IMAGE =========="
      docker build -t $(acrName).azurecr.io/$(imageRepository):$(imageTag) .

      Write-Host "========== TAG IMAGE =========="
      docker tag $(acrName).azurecr.io/$(imageRepository):$(imageTag) $(acrName).azurecr.io/$(imageRepository):latest

      Write-Host "========== PUSH BUILD ID TAG =========="
      docker push $(acrName).azurecr.io/$(imageRepository):$(imageTag)

      Write-Host "========== PUSH LATEST TAG =========="
      docker push $(acrName).azurecr.io/$(imageRepository):latest

      Write-Host "========== DONE =========="