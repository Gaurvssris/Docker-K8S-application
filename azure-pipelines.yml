# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml


trigger:
- main

pool:
  name: Devopsadvanceagent

variables:
  acrName: acrprod9838
  imageName: july-calendar
  tag: $(Build.BuildId)

steps:

- checkout: self

- task: AzureCLI@2
  displayName: Login to Azure and Push Docker Image
  inputs:
    azureSubscription: Devopsadvancesc
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      az acr login --name $(acrName)

      docker build -t $(acrName).azurecr.io/$(imageName):$(tag) .

      docker tag $(acrName).azurecr.io/$(imageName):$(tag) $(acrName).azurecr.io/$(imageName):latest

      docker push $(acrName).azurecr.io/$(imageName):$(tag)

      docker push $(acrName).azurecr.io/$(imageName):latest